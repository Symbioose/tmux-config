# ~/.config/tmux/tmux.conf
# Minimal · transparent · sidebar de sessions IA
# Repo: ~/Developer/tools/tmux  (symlinké vers ~/.config/tmux)
# ─────────────────────────────────────────────────────────────────────

### Base ##############################################################
set  -g prefix C-a
unbind C-b
bind   C-a send-prefix
set  -g mouse on
set -sg escape-time 10
set  -g history-limit 50000
set  -g base-index 1
setw -g pane-base-index 1
set  -g renumber-windows on
set  -g focus-events on
set  -g set-clipboard on
set  -g allow-rename off
setw -g automatic-rename off

### Truecolor + transparence #########################################
# bg=default partout => la transparence/blur de Ghostty traverse tmux.
set  -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -ga terminal-overrides ",*:Tc"

### Thème (transparent, sobre) #######################################
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=default,fg=colour245"
set -g status-left ""
set -g status-right "#[fg=colour109]#(~/.config/tmux/scripts/git-branch.sh '#{pane_current_path}')#[fg=colour240]  %H:%M "
set -g status-right-length 60
setw -g window-status-format         "#[fg=colour240] #I #W "
setw -g window-status-current-format "#[fg=colour109] #I #W "
setw -g window-status-separator ""

set -g pane-border-lines single
set -g pane-border-style        "fg=colour240"
set -g pane-active-border-style "fg=colour110"
set -g pane-border-status off

set -g message-style "bg=default,fg=colour109"
set -g mode-style    "bg=colour237,fg=colour223"
set -g display-time 1500

### Sidebar permanente (colonne de gauche) ###########################
set -g @sidebar_enabled 1
set-hook -g after-new-session      'run-shell "~/.config/tmux/scripts/ensure-sidebar.sh"'
set-hook -g after-new-window       'run-shell "~/.config/tmux/scripts/ensure-sidebar.sh"'
set-hook -g after-split-window     'run-shell "~/.config/tmux/scripts/ensure-sidebar.sh"'
set-hook -g session-window-changed 'run-shell "~/.config/tmux/scripts/ensure-sidebar.sh"'
set-hook -g client-attached        'run-shell "~/.config/tmux/scripts/ensure-sidebar.sh"'
# La colonne se met à jour seule par polling (1 s) — pas de signal fragile.

# Démon de statut : un seul process (détaché via nohup) calcule running/ready/
# idle + agent pour toutes les sessions ; colonne et switcher ne font que lire.
set-hook -ga client-attached 'run-shell "~/.config/tmux/scripts/launch-daemon.sh"'
run-shell "~/.config/tmux/scripts/launch-daemon.sh"

### Raccourcis #######################################################
bind r source-file ~/.config/tmux/tmux.conf \; display "config rechargée"

# Sessions  (j/k = naviguer, Tab = dernière, a = switcher fuzzy, n = nouveau terminal)
bind a display-popup -E -w 72% -h 62% "~/.config/tmux/scripts/switcher.sh"
bind n run-shell "~/.config/tmux/scripts/new-session.sh '#{pane_current_path}'"
bind -r j switch-client -n
bind -r k switch-client -p
bind Tab switch-client -l
bind m run-shell 'tmux set-option -t "#{session_name}" @status done' \; display "session: terminée"
bind M run-shell 'tmux set-option -u -t "#{session_name}" @status'   \; display "statut: auto"

# Colonne
bind b run-shell "~/.config/tmux/scripts/toggle-sidebar.sh"

# Fenêtres
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Panes  (flèches + h/l ; j/k restent réservés aux sessions)
bind h select-pane -L
bind l select-pane -R
bind Left  select-pane -L
bind Right select-pane -R
bind Up    select-pane -U
bind Down  select-pane -D
bind -r H resize-pane -L 4
bind -r L resize-pane -R 4
bind -r K resize-pane -U 2
bind -r J resize-pane -D 2

### Plugins (TPM) ####################################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
# Auto-restore OFF : resurrect ressuscite les panes sidebar en doublons "zombie"
# (l'option @is_sidebar n'est pas persistée). Restauration manuelle: prefix+C-r.
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'

# TPM init — DOIT rester en dernier (plugins dans ~/.config/tmux/plugins, gitignoré)
run '~/.config/tmux/plugins/tpm/tpm'
